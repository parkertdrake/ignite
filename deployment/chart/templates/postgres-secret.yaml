{{- if .Values.postgres.enabled }}
{{- /*
Preserves the existing password across upgrades. `lookup` returns the
current Secret if any; otherwise we generate a fresh password and
encode the resulting DATABASE_URL with it. Without this, every
`helm upgrade` would rotate the password and break the StatefulSet
pointing at the existing PVC.
*/ -}}
{{- $name := "ignite-postgres" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $user := .Values.postgres.user | default "ignite" -}}
{{- $db := .Values.postgres.database | default "ignite" -}}
{{- $password := "" -}}
{{- if $existing -}}
  {{- $password = index $existing.data "POSTGRES_PASSWORD" | b64dec -}}
{{- else -}}
  {{- $password = randAlphaNum 32 -}}
{{- end -}}
{{- $host := printf "ignite-postgres.%s.svc.cluster.local" .Release.Namespace -}}
{{- $dbUrl := printf "postgresql+asyncpg://%s:%s@%s:5432/%s" $user $password $host $db -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "ignite.labels" . | nindent 4 }}
    component: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ $user | quote }}
  POSTGRES_PASSWORD: {{ $password | quote }}
  POSTGRES_DB: {{ $db | quote }}
  DATABASE_URL: {{ $dbUrl | quote }}
{{- end }}
